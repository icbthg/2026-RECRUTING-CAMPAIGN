<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 J-US Recruiting Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --gold: #d4af37; --bg: #f4f7f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            background: #f4f7f9; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .main-wrapper { width: 100%; display: block; }

        /* 상단 헤더: 배경 70% */
        .top-header { 
            height: 70vh; min-height: 450px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('1st photo.jpg');
            background-size: cover; background-position: center;
            border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px; position: relative;
        }
        .top-header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2.2rem, 10vw, 4rem); margin: 15px 0; text-shadow: 3px 3px 15px rgba(0,0,0,0.7); font-weight: 900; }
        .top-header p { font-size: 1.1rem; margin: 0; letter-spacing: 5px; font-weight: 300; text-transform: uppercase; }

        /* 환영 문구 */
        .welcome-msg {
            position: absolute; left: 20px; bottom: 80px;
            font-size: 1.2rem; font-weight: 700; color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); z-index: 5;
        }

        .container-body { margin-top: -60px; padding: 0 15px 100px; position: relative; z-index: 10; }

        /* 1. 여행 개요 카드 (고정 영역 - 4줄 한 줄 최적화) */
        .fixed-card {
            background: #ffffff; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px 15px;
            width: 100%; margin-bottom: 20px;
        }
        h2 { color: var(--primary); font-size: 1.4rem; margin: 0 0 15px 0; border-left: 5px solid var(--gold); padding-left: 12px; }
        .info-box { background: #f0f4f8; border-radius: 15px; padding: 18px 12px; }
        .info-box p { 
            margin: 12px 0; line-height: 1.2; font-size: 0.9rem; color: #222; 
            white-space: nowrap; display: flex; align-items: center; 
        }
        .info-box p strong { min-width: 55px; margin-right: 5px; }

        /* 2. 탭 전용 카드 */
        .tab-card {
            background: #ffffff; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); padding: 25px 15px;
            width: 100%;
        }

        /* 탭 버튼 스타일 */
        .tab-nav { display: flex; gap: 6px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: 85px; padding: 15px 5px; border-radius: 12px;
            border: 2px solid #eee; background: #f9f9f9; color: #666;
            font-weight: bold; font-size: 0.9rem; cursor: pointer; white-space: nowrap;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 패널 내용 스타일 */
        .tab-panel { display: none; animation: fadeIn 0.4s ease; }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
