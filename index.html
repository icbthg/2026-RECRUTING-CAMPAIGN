<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 J-US Recruiting Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --gold: #d4af37; --bg: #f4f7f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            background: #f4f7f9; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* 상단 헤더: 50vh 최적화 */
        .top-header { 
            height: 50vh; min-height: 350px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('1st photo.jpg');
            background-size: cover; background-position: center;
            border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px; position: relative;
        }
        .top-header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); margin: 10px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); font-weight: 900; }
        .welcome-msg { position: absolute; left: 20px; bottom: 70px; font-size: 1.1rem; font-weight: 700; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }

        .container-body { margin-top: -50px; padding: 0 15px 100px; position: relative; z-index: 10; }

        /* [고정 영역] 여행 개요: 딱 4줄만 노출 */
        .fixed-card {
            background: #ffffff; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px 15px;
            margin-bottom: 20px; border: 1px solid #eee;
        }
        h2 { color: var(--primary); font-size: 1.3rem; margin: 0 0 15px 0; border-left: 5px solid var(--gold); padding-left: 12px; }
        .fixed-info { background: #f8f9fa; border-radius: 15px; padding: 15px 10px; }
        .fixed-info p { 
            margin: 10px 0; font-size: 0.88rem; color: #222; 
            white-space: nowrap; display: flex; align-items: center; 
        }
        .fixed-info p strong { min-width: 50px; color: var(--primary); }

        /* [탭 영역] 상세 내용 교체 */
        .tab-card {
            background: #ffffff; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); padding: 25px 15px;
        }

        .tab-nav { display: flex; gap: 6px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: 85px; padding: 15px 5px; border-radius: 12px;
            border: 2px solid #eee; background: #f9f9f9; color: #666;
            font-weight: bold; font-size: 0.85rem; cursor: pointer;
        }
